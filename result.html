<!DOCTYPE html>
<html>
<head>
    <title>Result</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top, #2b1055, #0f2027);
            color: white;
        }

        .container {
            padding: 40px;
        }

        .title {
            font-size: 30px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 30px;
        }

        .box {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
        }

        .box h3 {
            margin-bottom: 10px;
            color: #ffcc00;
        }

        pre {
            background: #111;
            color: #0f0;
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
            box-shadow: inset 0 0 10px rgba(0,255,0,0.2);
        }
        pre {
            background: #111;
            color: rgb(226, 126, 201);
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
            box-shadow: inset 0 0 10px rgba(0,255,0,0.2);
        }

        .btn-back {
            display: block;
            margin: auto;
            padding: 10px 25px;
            background: linear-gradient(45deg, #ffcc00, #ff6600);
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-back:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #ffcc00;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="title">🚀 Compilation Result</div>

    <div class="box">
        <h3>🧠 Generated Python Code</h3>
        <pre>{{ python_code }}</pre>
    </div>

    <div class="box">
        <h3>📤Expected Output</h3>
        <pre>{{ output }}</pre>
    </div>

    <form action="/" method="GET">
        <input type="hidden" name="code" value="{{ hinglish_code }}">
        <button class="btn-back">⬅ Back to Editor</button>
    </form>

</div>

</body>
</html>
